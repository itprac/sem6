<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - My Website</title>
  <link rel="stylesheet" href="style.css">
</head>


    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: left;
        }

        /* PDF Link */
        .pdf-link {
            color: blue;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Fullscreen Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }

        /* PDF iframe */
        .modal iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>


  <h1>  <a class="pdf-link" onclick="openPDF('ANDROID1.pdf')">📄 ANDROID_1</a><h1>
    <h1><a class="pdf-link" onclick="openPDF('ANDROID2.pdf')">📄 ANDROID_2</a><h1>
   
    <div id="pdfModal" class="modal">
        <span class="close-btn" onclick="closePDF()">&times;</span>
        <iframe id="pdfFrame"></iframe>
    </div>

    <script>
        function openPDF(filePath) {
            document.getElementById("pdfFrame").src = filePath;
            document.getElementById("pdfModal").style.display = "block";
        }

        function closePDF() {
            document.getElementById("pdfModal").style.display = "none";
            document.getElementById("pdfFrame").src = "";
        }
    </script>

</body>
</html>
