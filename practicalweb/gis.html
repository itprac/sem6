<h1><a href="gextra.html">SLIP QUESTIONS </a><br><h1>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: left;
        }
        .pdf-link {
            color: rgb(255, 0, 0);
            cursor: pointer;
            text-decoration: underline;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 30px;
            color: white;
            cursor: pointer;
        }
        .modal iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
<body>
   <h1> <a class="pdf-link" onclick="openPDF()">📄 GIS MANUAL</a><h1>
    <div id="pdfModal" class="modal">
        <span class="close-btn" onclick="closePDF()">&times;</span>
        <iframe src="gisman.pdf"></iframe>
    </div>
    <script>
        function openPDF() {
            document.getElementById("pdfModal").style.display = "block";
        }
        function closePDF() {
            document.getElementById("pdfModal").style.display = "none";
        }
    </script>
</body>
</html>
